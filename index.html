<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yogurt JYM - Empresa</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#eef2f3;color:#1f407d;transition:all 0.3s}
body.dark{background:#1c1c1c;color:#4da6ff}

/* Header */
header{background:#1f4037;color:#fff;text-align:center;padding:15px;border-bottom:4px solid #25D366;position:relative;transition:all 0.3s}
body.dark header{background:#0d1a1a}
header h1{margin:10px 0;font-size:24px}
header p{font-size:14px}

/* Logo con línea */
header .logo-container{display:flex;align-items:center;justify-content:center;position:relative}
header .logo-container img{width:120px;border-radius:50%}
header .logo-border{border:4px solid #25D366;padding:8px;border-radius:50%;display:inline-block;position:relative;transition:all 0.3s}
body.dark .logo-border{border-color:#4da6ff}

/* Botón modo oscuro */
.dark-btn{position:absolute;top:15px;right:15px;background:#4da6ff;color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;border:none;z-index:10;transition:all 0.3s}
body.dark .dark-btn{background:#1f4037;color:#fff}

/* Buscador */
.search{padding:12px}
.search input{width:100%;padding:10px;border-radius:12px;border:1px solid #ccc;transition:all 0.3s}
body.dark .search input{background:#333;color:#4da6ff;border:1px solid #4da6ff}

/* Productos grid */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:15px}
.card{background:#fff;border-radius:12px;padding:10px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.1);position:relative;transition:all 0.3s}
body.dark .card{background:#222;box-shadow:0 4px 12px rgba(0,0,0,.6)}
.card:hover{transform:scale(1.03)}
.card img{width:100%;height:120px;border-radius:12px;object-fit:cover}
.price{color:#1f4037;font-weight:bold;margin:5px 0}
body.dark .price{color:#4da6ff}
button{background:#1f4037;color:#fff;border:none;padding:6px 8px;border-radius:8px;margin-top:5px;cursor:pointer;transition:all 0.3s}
body.dark button{background:#4da6ff;color:#1c1c1c}
button.agotado{background:gray;cursor:not-allowed}
.like{position:absolute;top:8px;right:8px;font-size:18px;cursor:pointer}

/* Carrito flotante */
.cart-btn{position:fixed;bottom:15px;right:15px;background:#1f4037;color:#fff;border-radius:50%;width:55px;height:55px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;z-index:999}
body.dark .cart-btn{background:#4da6ff;color:#1c1c1c}
.cart-anim{animation:bounce .4s}
@keyframes bounce{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

/* Panel carrito */
.panel{position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top-left-radius:20px;border-top-right-radius:20px;padding:15px;box-shadow:0 -5px 20px rgba(0,0,0,.2);display:none;max-height:80vh;overflow-y:auto;z-index:998;transition:all 0.3s}
body.dark .panel{background:#222;color:#4da6ff;box-shadow:0 -5px 20px rgba(0,0,0,.6)}
.panel input{width:100%;padding:8px;margin:5px 0;border-radius:8px;border:1px solid #ccc;transition:all 0.3s}
body.dark .panel input{background:#333;color:#4da6ff;border:1px solid #4da6ff}
.panel ul{list-style:none;padding:0;margin:5px 0}
.panel li{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid #ddd}
body.dark .panel li{border-bottom:1px solid #4da6ff}
.panel li img{width:40px;height:40px;border-radius:8px;object-fit:cover}
.total{font-weight:bold;margin:10px 0}
.whatsapp{width:100%;padding:12px;background:#25D366;color:#fff;border:none;border-radius:10px;cursor:pointer;transition:all 0.3s}
body.dark .whatsapp{background:#1a7f44}
.close{background:red;color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;margin-bottom:10px}
body.dark .close{background:#cc0000}

/* Animación fly */
.fly{position:fixed;width:40px;height:40px;border-radius:50%;z-index:9999;transition:all .8s ease;pointer-events:none}
</style>
</head>
<body>

<header>
  <div class="logo-container">
    <div class="logo-border">
      <img src="logo.png" alt="Logo">
    </div>
    <button class="dark-btn" onclick="toggleDark()">🌙</button>
  </div>
  <h1>YOGURT J.Y.M</h1>
  <p>🍃 100% Artesanales • Delicioso y Natural 🍃</p>
</header>

<div class="search">
  <input type="text" id="buscador" placeholder="Buscar yogurt..." oninput="buscar()">
</div>

<div class="top" id="top"></div>
<div class="grid" id="products"></div>

<div class="cart-btn" onclick="toggleCart()">🛒<span id="count">0</span></div>

<div class="panel" id="panel">
  <button class="close" onclick="toggleCart()">✖ Cerrar</button>
  <h3>Tu pedido</h3>
  <input id="nombre" placeholder="Tu nombre">
  <input id="direccion" placeholder="Dirección">
  <ul id="lista"></ul>
  <div class="total">Total: $<span id="total">0</span></div>
  <button class="whatsapp" onclick="pedir()">Confirmar Pedido</button>
</div>

<script>
// Sonido
let sonido = new Audio("comprarr.mp3");

// Favoritos
let favoritos = JSON.parse(localStorage.getItem("likes")) || [];
function guardarLikes(){localStorage.setItem("likes",JSON.stringify(favoritos));}

// Productos
let productos=[
{name:"Mora 1L",precio:15000,img:"mor.jpg",ventas:0,stock:10,agotado:false},
{name:"Mango 1L",precio:15000,img:"man.jpg",ventas:0,stock:10,agotado:false},
{name:"Piña 1L",precio:15000,img:"piñ.jpg",ventas:0,stock:10,agotado:false},
{name:"Fresa 1L",precio:15000,img:"fres.jpg",ventas:0,stock:10,agotado:false},
{name:"kiwi 1L",precio:15000,img:"Kiwi.jpg",ventas:0,stock:10,agotado:false}
];

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
let total = 0;

function guardar(){localStorage.setItem("carrito",JSON.stringify(carrito));}
function toggleDark(){document.body.classList.toggle("dark");}

// Render Top vendido
function renderTop(){
  let top = [...productos].sort((a,b)=>b.ventas-a.ventas)[0];
  document.getElementById("top").innerText = `🔥 Más vendido: ${top.name}`;
}

// Render Productos
function renderProductos(lista=productos){
  const cont=document.getElementById("products"); cont.innerHTML="";
  lista.forEach((p,i)=>{
    let liked = favoritos.includes(i);
    cont.innerHTML+=`
      <div class="card">
        <div class="like" onclick="toggleLike(${i})">${liked?"❤️":"🤍"}</div>
        <img src="${p.img}" alt="${p.name}">
        <h4>${p.name}</h4>
        <div class="price">$${p.precio}</div>
        ${p.stock>0 ? `<button onclick="add(${i}, this)">Agregar</button>` : `<button disabled class="agotado">Agotado</button>`}
      </div>`;
  });
}

// Buscar
function buscar(){let t=document.getElementById("buscador").value.toLowerCase(); renderProductos(productos.filter(p=>p.name.toLowerCase().includes(t)));}

// Favoritos
function toggleLike(i){if(favoritos.includes(i)) favoritos=favoritos.filter(x=>x!==i); else favoritos.push(i); guardarLikes(); renderProductos();}

// Agregar al carrito
function add(i,btn){
  if(productos[i].stock<=0){alert("Producto agotado"); return;}
  sonido.currentTime=0; sonido.play();

  let img = btn.parentElement.querySelector("img");
  let rect = img.getBoundingClientRect();
  let clone = img.cloneNode(true);
  clone.classList.add("fly");
  clone.style.left=rect.left+"px";
  clone.style.top=rect.top+"px";
  document.body.appendChild(clone);

  let cartBtn=document.querySelector(".cart-btn");
  let cart=cartBtn.getBoundingClientRect();
  setTimeout(()=>{
    clone.style.left=cart.left+"px";
    clone.style.top=cart.top+"px";
    clone.style.width="10px";
    clone.style.height="10px";
    clone.style.opacity=0;
  },10);
  setTimeout(()=>clone.remove(),800);

  cartBtn.classList.add("cart-anim");
  setTimeout(()=>cartBtn.classList.remove("cart-anim"),400);

  productos[i].stock--;
  carrito.push(productos[i]);
  productos[i].ventas++;
  guardar(); render(); renderTop(); renderProductos();
}

// Carrito
function render(){
  document.getElementById("count").innerText=carrito.length;
  let lista=document.getElementById("lista"); lista.innerHTML=""; total=0;
  carrito.forEach((p,i)=>{total+=p.precio; lista.innerHTML+=`<li><img src="${p.img}" alt="${p.name}"> ${p.name} $${p.precio} <button onclick="remove(${i})">❌</button></li>`;});
  document.getElementById("total").innerText=total;
}
function remove(i){carrito.splice(i,1); render(); guardar();}
function toggleCart(){let p=document.getElementById("panel");p.style.display=p.style.display==="block"?"none":"block";}
function pedir(){
  let nombre=document.getElementById("nombre").value;
  let direccion=document.getElementById("direccion").value;
  if(carrito.length==0||!nombre||!direccion){alert("Completa datos");return;}
  let msg=`Pedido:%0ACliente: ${nombre}%0ADirección: ${direccion}%0A`;
  carrito.forEach(p=>{msg+=`- ${p.name} $${p.precio}%0A`});
  msg+=`Total: $${total}`;
  window.open(`https://wa.me/573106505193?text=${msg}`);
}

// Inicializar
renderProductos();
renderTop();
render();
</script>
</body>
</html>
